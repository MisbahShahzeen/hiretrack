spring.application.name=hiretrack

spring.datasource.url=jdbc:mysql://localhost:3306/hiretrack_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.model=gemini-2.5-flash
app.gemini.base-url=https://generativelanguage.googleapis.com/v1beta